
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/6333 && echo ok || exit 1"]
      interval: 10s
      retries: 5
      start_period: 15s    


  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_PROJECT=kyc-rag-rbi
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: on-failure

volumes:
  qdrant_storage:
