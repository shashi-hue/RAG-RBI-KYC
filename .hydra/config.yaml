ingestion:
  pdf_path: data/raw/KYC_Directions_2025.pdf
  chunks_out: data/processed/chunks.jsonl
  annex_iv_out: data/processed/annex_iv.jsonl
  repealed_out: data/processed/repealed_circulars.json
  metrics_out: reports/ingestion_metrics.json
  footer_lookback: 50
embedding:
  model: BAAI/bge-large-en-v1.5
  sparse_model: Qdrant/bm25
  batch_size: 32
  collection_name: kyc_master_direction
reranker:
  model: cross-encoder/ms-marco-MiniLM-L-12-v2
  top_k_retrieve: 20
  top_k_return: 5
qdrant:
  url: ${oc.env:QDRANT_URL}
  api_key: ${oc.env:QDRANT_API_KEY}
llm:
  provider: groq
  model: llama-3.3-70b-versatile
  temperature: 0.0
  max_tokens: 1024
  api_key: ${oc.env:GROQ_API_KEY}
